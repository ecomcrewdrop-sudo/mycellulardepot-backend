[phases.setup]
aptPkgs = ["chromium", "libgbm1", "libnss3", "libatk-bridge2.0-0", "libx11-xcb1", "libxcomposite1", "libxdamage1", "libxrandr2", "libpango-1.0-0", "libcairo2", "libasound2", "libxshmfence1"]

[phases.install]
cmds = ["npm install"]

[start]
cmd = "node server.js"

[variables]
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
